<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVI Reservas - Resultados</title>
    <link rel="stylesheet" href="styles/resultados.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">LAVI <strong>RESERVAS</strong></div>
        <div class="search-summary">
            <span style="color: #1a6ef5; margin-right: 8px;">🔍</span> 
            Lisboa · 15–20 Jun · 2 hóspedes · Hotel
        </div>
        <button class="edit-btn">Editar</button>
    </header>

    <nav class="mobile-nav">
        <button class="chip">Filtros</button>
        <button class="chip">Preço ↑</button>
        <button class="chip">📍 Mapa</button>
    </nav>

    <div class="breadcrumbs">
        <a href="#">Home</a> › <a href="#">Hotéis</a> › Lisboa
    </div>

    <div class="main-layout">
        
        <aside class="filters-sidebar">
            <h3>Filtros <button class="reset-btn">Reset</button></h3>
            
            <div class="filter-group">
                <h4>Preço por noite</h4>
                <input type="range" id="price-slider" min="0" max="1000" value="1000">
                <label id="price-label" style="text-align: right; display: block; color: #1a6ef5; font-size: 12px; font-weight: bold; margin-top: 5px;">até 1000 €</label>
            </div>

            <div class="filter-group">
                <h4>Classificação</h4>
                <label><input type="checkbox" class="star-filter" value="5" checked> ★★★★★</label>
                <label><input type="checkbox" class="star-filter" value="4" checked> ★★★★</label>
                <label><input type="checkbox" class="star-filter" value="3" checked> ★★★</label>
            </div>

            <div class="filter-group">
                <h4>Comodidades</h4>
                <label><input type="checkbox" checked> Wi-Fi gratuito</label>
                <label><input type="checkbox"> Piscina</label>
                <label><input type="checkbox"> Estacionamento</label>
                <label><input type="checkbox"> Pet-friendly</label>
                <label><input type="checkbox"> Spa</label>
                <label><input type="checkbox"> Academia</label>
            </div>

            <button class="apply-btn">Aplicar filtros</button>
        </aside>

        <section class="results-section">
            <div class="results-header">
                <span id="results-count">0 resultados</span>
                <select id="sort-options">
                    <option value="asc">Preço crescente ↑</option>
                    <option value="desc">Preço decrescente ↓</option>
                </select>
            </div>

            <div class="hotel-list"></div>
        </section>

        <aside class="map-container">
            <a href="https://www.google.com/maps/search/hoteis+lisboa" target="_blank" class="map-link">
                <iframe src="https://maps.google.com/maps?q=Lisboa&t=&z=13&ie=UTF8&iwloc=&output=embed" frameborder="0"></iframe>
                <div class="map-overlay">
                    <button class="view-map-btn">📍 Ver resultados no mapa</button>
                </div>
            </a>
        </aside>

    </div>

    <script src="scripts/resultados.js"></script>
</body>
</html>
