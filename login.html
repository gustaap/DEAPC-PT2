<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAVI Reservas — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
  <style>
    /* ── Variáveis ── */
    :root {
      --azul:       #1a6bcc;
      --azul-hover: #155bb0;
      --laranja:    #f57c00;
      --fundo:      #f4f6f9;
      --branco:     #ffffff;
      --cinza-borda:#d8dde6;
      --cinza-texto:#6b7280;
      --texto:      #1a1f2e;
      --sombra:     0 4px 24px rgba(0,0,0,0.08);
      --radius:     12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: var(--branco);
      border-bottom: 1px solid var(--cinza-borda);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--texto);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .logo span {
      color: var(--laranja);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      margin-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Layout principal ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .login-card {
      background: var(--branco);
      border-radius: var(--radius);
      box-shadow: var(--sombra);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-card h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 6px;
      color: var(--texto);
    }

    .login-card .subtitulo {
      color: var(--cinza-texto);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* ── Formulário ── */
    .campo {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .campo label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--texto);
    }

    .campo input {
      height: 44px;
      border: 1.5px solid var(--cinza-borda);
      border-radius: 8px;
      padding: 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--texto);
      outline: none;
      transition: border-color 0.2s;
      background: var(--branco);
    }

    .campo input:focus {
      border-color: var(--azul);
    }

    .campo input::placeholder {
      color: #b0b8c9;
    }

    /* Linha "lembrar + esqueci" */
    .opcoes-login {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.85rem;
    }

    .opcoes-login label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cinza-texto);
      cursor: pointer;
    }

    .opcoes-login input[type="checkbox"] {
      accent-color: var(--azul);
      width: 15px;
      height: 15px;
    }

    .esqueci {
      color: var(--azul);
      text-decoration: none;
      font-weight: 500;
    }

    .esqueci:hover { text-decoration: underline; }

    /* Botão principal */
    .btn-login {
      width: 100%;
      height: 46px;
      background: var(--azul);
      color: var(--branco);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 20px;
    }

    .btn-login:hover { background: var(--azul-hover); }

    /* Divisor */
    .divisor {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: var(--cinza-borda);
      font-size: 0.8rem;
    }

    .divisor::before,
    .divisor::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cinza-borda);
    }

    .divisor span { color: var(--cinza-texto); white-space: nowrap; }

    /* Botão criar conta */
    .btn-criar {
      width: 100%;
      height: 46px;
      background: transparent;
      color: var(--azul);
      border: 1.5px solid var(--azul);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-criar:hover {
      background: var(--azul);
      color: var(--branco);
    }

    /* ── Responsividade ── */
    @media (max-width: 480px) {
      nav { padding: 0 16px; }

      .login-card {
        padding: 36px 24px;
        border-radius: 10px;
      }

      .login-card h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="index.html" class="logo">LAVI <span>| Reservas</span></a>
  </nav>

  <!-- Conteúdo -->
  <main>
    <div class="login-card">
      <h1>Bem-vindo de volta</h1>
      <p class="subtitulo">Inicia sessão para aceder às tuas reservas</p>

      <!-- Formulário de login -->
      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="exemplo@email.com" required />
      </div>

      <div class="campo">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="A tua password" required />
      </div>

      <div class="opcoes-login">
        <label>
          <input type="checkbox" name="lembrar" />
          Lembrar-me
        </label>
        <a href="#" class="esqueci">Esqueceste a password?</a>
      </div>

      <button type="button" class="btn-login" onclick="window.location.href='historico.html'">
        Iniciar sessão
      </button>

      <div class="divisor"><span>ou</span></div>

      <a href="#" class="btn-criar">Criar conta</a>
    </div>
  </main>

</body>
</html>
