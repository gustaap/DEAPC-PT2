<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAVI Reservas — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
  <link rel="stylesheet" href="styles/login.css" />

</head>

<body>

  <nav>
    <a href="index.html" class="logo">LAVI <span>| Reservas</span></a>
  </nav>

  <main class="login-hero">
    <div class="login-bg-slide active" style="background-image: url('images/paris-hero.jpg');"></div>
    <div class="login-bg-slide" style="background-image: url('images/sagrada1-hero.jpg');"></div>
    <div class="login-bg-slide" style="background-image: url('images/coliseu-hero.jpg');"></div>
    <div class="login-bg-slide" style="background-image: url('images/opera-hero.jpg');"></div>

    <div class="login-overlay"></div>

    <div class="login-card">
      <h1 id="titulo-auth">Bem-vindo de volta</h1>
      <p class="subtitulo" id="subtitulo-auth">
        Inicia sessão para aceder às tuas reservas
      </p>

      <form id="auth-form">
        <div class="campo hidden" id="campo-nome">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="O teu nome" />
        </div>

        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="exemplo@email.com" required />
        </div>

        <div class="campo">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="A tua password" required />
        </div>

        <div class="campo hidden" id="campo-confirmar-password">
          <label for="confirmar-password">Confirmar password</label>
          <input type="password" id="confirmar-password" name="confirmar-password" placeholder="Repete a password" />
        </div>

        <div class="opcoes-login" id="opcoes-login">
          <label>
            <input type="checkbox" id="lembrar" name="lembrar" />
            Lembrar-me
          </label>

          <a href="#" class="esqueci" id="esqueci-password">Esqueceste a password?</a>
        </div>

        <div class="mensagem" id="mensagem-auth"></div>

        <button type="submit" class="btn-login" id="btn-submit">
          Iniciar sessão
        </button>
      </form>

      <div class="divisor">
        <span>ou</span>
      </div>

      <button type="button" class="btn-criar" id="btn-toggle-mode">
        Criar conta
      </button>
    </div>
  </main>
<script src="scripts/login.js"></script>

</body>
</html>
